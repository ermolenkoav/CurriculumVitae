name: Compile and Release Latex

on:
  push:
    branches:
      - main
      - dev
    tags:
      - '*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: [resume_en.tex, resume_ru.tex]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@latest

      - name: Compile ${{ matrix.file }}
        uses: dante-ev/latex-action@latest
        with:
          root_file: ${{ matrix.file }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}.pdf
          path: ./*.pdf

      - name: Release
        uses: softprops/action-gh-release@latest
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./*.pdf
